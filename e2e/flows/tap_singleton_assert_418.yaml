# Tap "A: SINGLETON" and assert UI shows HTTP 418. Body content is not
# checked here — tests that push a specific body should assert it inline,
# so this flow remains usable from rules-only tests (e.g. force-stop
# scenarios that don't include a body payload).
#
# No launchApp — see tap_singleton.yaml for why.
appId: com.tkhskt.forja.sample
---
- tapOn:
    id: "fetch_singleton"
- extendedWaitUntil:
    visible:
      text: ".*HTTP 418.*"
    timeout: 15000
